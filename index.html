<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 중1 영어 Start-up Quiz!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Let's Start English Quiz! 🚀</h1>
        <hr>
        <div id="quiz-box">
            <div id="timer-box">⏱️ 남은 시간: <span id="time-left">10</span>초</div>
            
            <div id="question-number">Question 1 of 3</div>
            <div id="question-text">여기에 문제가 들어갑니다.</div>
            <div id="options-container">
                </div>
            <button id="next-btn" class="hidden">Next Question ➡️</button>
        </div>
        
        <div id="result-box" class="hidden">
            <h2>🎉 Quiz Completed!</h2>
            <p id="score-text">너의 점수는...</p>
            <button id="restart-btn">Try Again 🔄</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
